services:
  postgres:
    image: postgres:16-alpine
    container_name: myeconomy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-myeconomy}
      POSTGRES_USER: ${POSTGRES_USER:-myeconomy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-myeconomy}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - myeconomy_postgres_data:/var/lib/postgresql/data
      - ./server/src/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-myeconomy} -d ${POSTGRES_DB:-myeconomy}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - myeconomy

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: myeconomy-api
    restart: unless-stopped
    environment:
      PORT: 3333
      DATABASE_URL: postgresql://${POSTGRES_USER:-myeconomy}:${POSTGRES_PASSWORD:-myeconomy}@postgres:5432/${POSTGRES_DB:-myeconomy}
      JWT_SECRET: ${JWT_SECRET:-desenvolvimento-chave-jwt-myeconomy-123456789}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - "${API_PORT:-3333}:3333"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3333/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - myeconomy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myeconomy-app
    restart: "no"
    environment:
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-auto}
      REACT_NATIVE_PACKAGER_HOSTNAME: ${REACT_NATIVE_PACKAGER_HOSTNAME:-10.0.2.2}
      EXPO_HOST: ${EXPO_HOST:-lan}
      EXPO_PORT: ${EXPO_PORT:-8081}
      BROWSER: none
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      WATCHPACK_POLLING: "true"
    ports:
      - "${EXPO_PORT:-8081}:${EXPO_PORT:-8081}"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - .:/app
      - myeconomy_app_node_modules:/app/node_modules
    stdin_open: true
    tty: true
    networks:
      - myeconomy

networks:
  myeconomy:
    name: myeconomy_network

volumes:
  myeconomy_app_node_modules:
    name: myeconomy_app_node_modules
  myeconomy_postgres_data:
    name: myeconomy_postgres_data
